
<style>
* { box-sizing: border-box; }
body { margin: 0; }
.wrap { padding: 1rem 0; font-family: var(--font-sans); }
.drop-zone { border: 1.5px dashed var(--color-border-secondary); border-radius: var(--border-radius-lg); padding: 2.5rem 1rem; text-align: center; cursor: pointer; background: var(--color-background-secondary); transition: background 0.15s; }
.drop-zone:hover { background: var(--color-background-tertiary); }
.section { background: var(--color-background-secondary); border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-tertiary); padding: 14px 16px; margin-bottom: 12px; }
.section-title { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em; }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
label { font-size: 13px; color: var(--color-text-secondary); display: block; margin-bottom: 4px; }
.val { font-weight: 500; color: var(--color-text-primary); }
.btn-primary { background: var(--color-text-primary); color: var(--color-background-primary); border: none; border-radius: var(--border-radius-md); padding: 10px 20px; font-size: 14px; font-weight: 500; cursor: pointer; width: 100%; margin-top: 4px; }
.btn-primary:hover { opacity: 0.85; }
.btn-primary:disabled { opacity: 0.35; cursor: not-allowed; }
.btn-outline { background: transparent; color: var(--color-text-primary); border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); padding: 9px 16px; font-size: 13px; cursor: pointer; }
.btn-outline:hover { background: var(--color-background-secondary); }
.btn-outline:disabled { opacity: 0.35; cursor: not-allowed; }
.pages-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; margin-top: 8px; max-height: 280px; overflow-y: auto; }
.page-thumb { border-radius: 6px; overflow: hidden; border: 0.5px solid var(--color-border-tertiary); position: relative; background: #111; }
.page-thumb canvas { width: 100%; height: auto; display: block; }
.page-num { position: absolute; bottom: 4px; right: 6px; font-size: 10px; background: rgba(0,0,0,0.6); color: #fff; padding: 1px 5px; border-radius: 4px; }
.page-status { position: absolute; top: 4px; left: 4px; font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: 500; }
.status-done { background: var(--color-background-success); color: var(--color-text-success); }
.status-proc { background: var(--color-background-warning); color: var(--color-text-warning); }
.progress-bar { width: 100%; height: 6px; background: var(--color-border-tertiary); border-radius: 99px; overflow: hidden; margin: 8px 0; }
.progress-fill { height: 100%; background: var(--color-text-primary); border-radius: 99px; transition: width 0.2s; }
.actions { display: flex; gap: 8px; margin-top: 10px; }
.color-chips { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
.chip { display: flex; align-items: center; gap: 5px; background: var(--color-background-primary); border: 0.5px solid var(--color-border-secondary); border-radius: 99px; padding: 3px 10px 3px 6px; font-size: 12px; cursor: pointer; color: var(--color-text-secondary); }
.chip.active { border-color: var(--color-border-primary); color: var(--color-text-primary); font-weight: 500; }
.chip-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
</style>

<div class="wrap">
  <h2 class="sr-only">PDF ink remover — strips colored handwritten annotations from all pages of a PDF</h2>

  <div id="dropZone" class="drop-zone" onclick="document.getElementById('pdfIn').click()">
    <input type="file" id="pdfIn" accept=".pdf" style="display:none">
    <div style="font-size:36px;line-height:1;margin-bottom:8px;">📄</div>
    <div style="font-weight:500;color:var(--color-text-primary);">Upload your PDF</div>
    <div style="font-size:13px;color:var(--color-text-secondary);margin-top:4px;">Click or drag & drop · PDF files only</div>
  </div>

  <div id="mainUI" style="display:none;margin-top:1rem;">

    <div class="section">
      <div class="section-title">Detection mode</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;">
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer;margin:0;">
          <input type="radio" name="mode" value="auto" id="modeAuto" checked> <span style="font-size:13px;color:var(--color-text-primary);">Auto — remove all colored ink (recommended)</span>
        </label>
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer;margin:0;">
          <input type="radio" name="mode" value="manual" id="modeManual"> <span style="font-size:13px;color:var(--color-text-primary);">Manual — pick specific colors</span>
        </label>
      </div>

      <div id="autoSettings">
        <div class="grid2">
          <div>
            <label>Color saturation threshold <span class="val" id="satVal">35</span>%</label>
            <input type="range" id="satSlider" min="10" max="80" value="35" step="1" style="width:100%">
          </div>
          <div>
            <label>Background type</label>
            <select id="bgType" style="width:100%;font-size:13px;padding:5px 8px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);">
              <option value="white">White / light background</option>
              <option value="dark">Dark / black background</option>
              <option value="smart">Smart (auto-detect)</option>
            </select>
          </div>
        </div>
      </div>

      <div id="manualSettings" style="display:none">
        <label style="margin-bottom:6px;display:block;">Select colors to remove:</label>
        <div class="color-chips" id="colorChips">
          <div class="chip active" data-h="20,40" title="Orange"><div class="chip-dot" style="background:#e07b00"></div>Orange</div>
          <div class="chip active" data-h="340,10" title="Red"><div class="chip-dot" style="background:#e03030"></div>Red</div>
          <div class="chip" data-h="200,230" title="Blue"><div class="chip-dot" style="background:#2060d0"></div>Blue</div>
          <div class="chip" data-h="110,150" title="Green"><div class="chip-dot" style="background:#20a020"></div>Green</div>
          <div class="chip" data-h="50,70" title="Yellow"><div class="chip-dot" style="background:#c8b000"></div>Yellow</div>
          <div class="chip" data-h="280,310" title="Purple"><div class="chip-dot" style="background:#9030c0"></div>Purple</div>
          <div class="chip" data-h="170,200" title="Cyan"><div class="chip-dot" style="background:#00aacc"></div>Cyan</div>
        </div>
        <div style="margin-top:8px;">
          <label>Sensitivity <span class="val" id="manSensVal">60</span></label>
          <input type="range" id="manSensSlider" min="20" max="100" value="60" step="1" style="width:100%">
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Pages <span id="pageCount" style="color:var(--color-text-primary);text-transform:none;font-weight:500;letter-spacing:0"></span></div>
      <div class="pages-grid" id="pagesGrid"></div>
    </div>

    <div id="progressSection" style="display:none;" class="section">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
        <span style="font-size:13px;color:var(--color-text-secondary);" id="progressLabel">Processing…</span>
        <span style="font-size:13px;font-weight:500;" id="progressPct">0%</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    </div>

    <div class="actions">
      <button class="btn-primary" id="processBtn" onclick="startProcessing()">Remove all ink from PDF</button>
      <button class="btn-outline" id="downloadBtn" onclick="downloadPDF()" disabled>Download cleaned PDF</button>
    </div>
    <div style="margin-top:8px;font-size:12px;color:var(--color-text-secondary);" id="statusMsg"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let pdfDoc = null;
let totalPages = 0;
let cleanedCanvases = [];
let pdfBytes = null;

const pdfIn = document.getElementById('pdfIn');
const dropZone = document.getElementById('dropZone');
const mainUI = document.getElementById('mainUI');
const pagesGrid = document.getElementById('pagesGrid');
const processBtn = document.getElementById('processBtn');
const downloadBtn = document.getElementById('downloadBtn');
const statusMsg = document.getElementById('statusMsg');
const progressSection = document.getElementById('progressSection');
const progressFill = document.getElementById('progressFill');
const progressPct = document.getElementById('progressPct');
const progressLabel = document.getElementById('progressLabel');

document.getElementById('satSlider').oninput = e => { document.getElementById('satVal').textContent = e.target.value; };
document.getElementById('manSensSlider').oninput = e => { document.getElementById('manSensVal').textContent = e.target.value; };

document.querySelectorAll('input[name="mode"]').forEach(r => {
  r.onchange = () => {
    document.getElementById('autoSettings').style.display = r.value === 'auto' ? 'block' : 'none';
    document.getElementById('manualSettings').style.display = r.value === 'manual' ? 'block' : 'none';
  };
});

document.querySelectorAll('.chip').forEach(c => {
  c.onclick = () => c.classList.toggle('active');
});

dropZone.ondragover = e => e.preventDefault();
dropZone.ondrop = e => { e.preventDefault(); if(e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]); };
pdfIn.onchange = e => { if(e.target.files[0]) handleFile(e.target.files[0]); };

async function handleFile(file) {
  statusMsg.textContent = 'Loading PDF…';
  const ab = await file.arrayBuffer();
  pdfBytes = ab;
  pdfDoc = await pdfjsLib.getDocument({data: ab}).promise;
  totalPages = pdfDoc.numPages;
  document.getElementById('pageCount').textContent = totalPages + ' pages';
  pagesGrid.innerHTML = '';
  cleanedCanvases = new Array(totalPages).fill(null);
  dropZone.style.display = 'none';
  mainUI.style.display = 'block';
  statusMsg.textContent = `Loaded: ${totalPages} pages`;
  await renderThumbs();
}

async function renderThumbs() {
  for(let i = 1; i <= totalPages; i++) {
    const page = await pdfDoc.getPage(i);
    const vp = page.getViewport({scale: 0.3});
    const cv = document.createElement('canvas');
    cv.width = vp.width; cv.height = vp.height;
    await page.render({canvasContext: cv.getContext('2d'), viewport: vp}).promise;
    const box = document.createElement('div');
    box.className = 'page-thumb';
    box.id = `thumb-${i}`;
    box.appendChild(cv);
    const num = document.createElement('div');
    num.className = 'page-num'; num.textContent = i;
    box.appendChild(num);
    pagesGrid.appendChild(box);
  }
}

function rgbToHsl(r, g, b) {
  r /= 255; g /= 255; b /= 255;
  const max = Math.max(r,g,b), min = Math.min(r,g,b);
  let h, s, l = (max+min)/2;
  if(max === min) { h=s=0; }
  else {
    const d = max-min;
    s = l > 0.5 ? d/(2-max-min) : d/(max+min);
    switch(max){
      case r: h=((g-b)/d+(g<b?6:0))/6; break;
      case g: h=((b-r)/d+2)/6; break;
      case b: h=((r-g)/d+4)/6; break;
    }
  }
  return {h: h*360, s, l};
}

function isColoredInkAuto(r, g, b, satThreshold, bgType) {
  const {h, s, l} = rgbToHsl(r, g, b);
  const sat = s * 100;
  if(sat < satThreshold) return false;
  if(bgType === 'white') { if(l > 0.92) return false; if(l < 0.08) return false; }
  else if(bgType === 'dark') { if(l < 0.05) return false; if(l > 0.95) return false; }
  else { if(l < 0.04 || l > 0.96) return false; }
  return true;
}

function isColoredInkManual(r, g, b, activeHues, sensitivity) {
  const {h, s, l} = rgbToHsl(r, g, b);
  if(s < 0.2) return false;
  if(l < 0.05 || l > 0.95) return false;
  const dist = sensitivity * 1.5;
  for(const [hMin, hMax] of activeHues) {
    if(hMin > hMax) { if(h >= hMin || h <= hMax) return true; }
    else { if(h >= hMin - dist && h <= hMax + dist) return true; }
  }
  return false;
}

function getNeighborFill(data, x, y, w, h, mask) {
  let sr=0,sg=0,sb=0,cnt=0;
  for(let dy=-5;dy<=5;dy++) for(let dx=-5;dx<=5;dx++) {
    const nx=x+dx,ny=y+dy;
    if(nx<0||ny<0||nx>=w||ny>=h) continue;
    if(mask[ny*w+nx]) continue;
    const ni=(ny*w+nx)*4;
    sr+=data[ni];sg+=data[ni+1];sb+=data[ni+2];cnt++;
  }
  if(cnt>0) return [Math.round(sr/cnt),Math.round(sg/cnt),Math.round(sb/cnt)];
  return null;
}

async function processPage(pageNum) {
  const page = await pdfDoc.getPage(pageNum);
  const scale = 2.0;
  const vp = page.getViewport({scale});
  const cv = document.createElement('canvas');
  cv.width = vp.width; cv.height = vp.height;
  const ctx = cv.getContext('2d');
  await page.render({canvasContext: ctx, viewport: vp}).promise;

  const imgData = ctx.getImageData(0, 0, cv.width, cv.height);
  const data = imgData.data;
  const w = cv.width, h = cv.height;
  const mask = new Uint8Array(w*h);

  const mode = document.querySelector('input[name="mode"]:checked').value;
  const bgType = document.getElementById('bgType').value;
  const satThreshold = parseInt(document.getElementById('satSlider').value);
  const manSens = parseInt(document.getElementById('manSensSlider').value) / 100 * 60;

  const activeHues = [];
  if(mode === 'manual') {
    document.querySelectorAll('.chip.active').forEach(c => {
      const parts = c.dataset.h.split(',').map(Number);
      activeHues.push(parts);
    });
  }

  for(let y=0;y<h;y++) for(let x=0;x<w;x++) {
    const i=(y*w+x)*4;
    const r=data[i],g=data[i+1],b=data[i+2];
    let ink = false;
    if(mode==='auto') ink = isColoredInkAuto(r,g,b,satThreshold,bgType);
    else ink = isColoredInkManual(r,g,b,activeHues,manSens);
    if(ink) mask[y*w+x]=1;
  }

  for(let y=0;y<h;y++) for(let x=0;x<w;x++) {
    if(!mask[y*w+x]) continue;
    const i=(y*w+x)*4;
    const fill = getNeighborFill(data,x,y,w,h,mask);
    if(fill) { data[i]=fill[0];data[i+1]=fill[1];data[i+2]=fill[2];data[i+3]=255; }
    else {
      const bg = bgType==='dark'?0:255;
      data[i]=bg;data[i+1]=bg;data[i+2]=bg;data[i+3]=255;
    }
  }

  ctx.putImageData(imgData, 0, 0);
  return cv;
}

async function startProcessing() {
  processBtn.disabled = true;
  downloadBtn.disabled = true;
  progressSection.style.display = 'block';
  cleanedCanvases = [];

  for(let i=1;i<=totalPages;i++) {
    progressLabel.textContent = `Processing page ${i} of ${totalPages}…`;
    const pct = Math.round(((i-1)/totalPages)*100);
    progressFill.style.width = pct+'%';
    progressPct.textContent = pct+'%';

    const thumb = document.getElementById(`thumb-${i}`);
    const s = document.createElement('div');
    s.className='page-status status-proc'; s.textContent='…';
    thumb.appendChild(s);

    const cleaned = await processPage(i);
    cleanedCanvases.push(cleaned);

    s.className='page-status status-done'; s.textContent='✓';
    const cv = thumb.querySelector('canvas');
    const ctx = cv.getContext('2d');
    cv.width = cleaned.width; cv.height = cleaned.height;
    ctx.drawImage(cleaned, 0, 0, cv.width, cv.height);

    await new Promise(r => setTimeout(r, 0));
  }

  progressFill.style.width='100%'; progressPct.textContent='100%';
  progressLabel.textContent='All pages processed!';
  processBtn.disabled = false;
  downloadBtn.disabled = false;
  statusMsg.textContent = `All ${totalPages} pages cleaned. Click Download to save.`;
}

async function downloadPDF() {
  if(!cleanedCanvases.length) return;
  downloadBtn.disabled = true;
  statusMsg.textContent = 'Building PDF…';

  const { jsPDF } = window.jspdf;
  const firstCv = cleanedCanvases[0];
  const wPt = firstCv.width * 72 / 144;
  const hPt = firstCv.height * 72 / 144;

  const pdf = new jsPDF({ orientation: wPt>hPt?'landscape':'portrait', unit:'pt', format:[wPt,hPt] });

  for(let i=0;i<cleanedCanvases.length;i++) {
    if(i>0) {
      const cv = cleanedCanvases[i];
      const w2 = cv.width*72/144, h2=cv.height*72/144;
      pdf.addPage([w2,h2], w2>h2?'landscape':'portrait');
    }
    const imgData = cleanedCanvases[i].toDataURL('image/jpeg', 0.92);
    const cv = cleanedCanvases[i];
    const w2=cv.width*72/144, h2=cv.height*72/144;
    pdf.addImage(imgData,'JPEG',0,0,w2,h2);
    statusMsg.textContent = `Building PDF: page ${i+1}/${cleanedCanvases.length}…`;
    await new Promise(r=>setTimeout(r,0));
  }

  pdf.save('cleaned_document.pdf');
  downloadBtn.disabled = false;
  statusMsg.textContent = 'PDF downloaded!';
}
</script>
